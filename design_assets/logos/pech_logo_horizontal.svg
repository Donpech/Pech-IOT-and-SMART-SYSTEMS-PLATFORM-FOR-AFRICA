      <stop offset="0%" style="stop-color:#00BFFF"/>
      <stop offset="100%" style="stop-color:#F5A623"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF"/>
      <stop offset="100%" style="stop-color:#0099CC"/>
    </linearGradient>
  </defs>
  <!-- Hexagonal Icon (compact) -->
  <polygon points="40,4 70,19.5 70,50.5 40,66 10,50.5 10,19.5" fill="url(#hexGrad)" stroke="none"/>
  <polygon points="40,12 63,24 63,46 40,58 17,46 17,24" fill="#FFFFFF" opacity="0.15"/>
  <!-- Solar symbol (smaller) -->
  <circle cx="40" cy="35" r="10" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="40" y1="21" x2="40" y2="26" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="40" y1="44" x2="40" y2="49" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="26" y1="35" x2="31" y2="35" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="49" y1="35" x2="54" y2="35" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="30" y1="25" x2="33.5" y2="28.5" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="46.5" y1="41.5" x2="50" y2="45" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="50" y1="25" x2="46.5" y2="28.5" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="33.5" y1="41.5" x2="30" y2="45" stroke="#FFFFFF" stroke-width="1.8" stroke-linecap="round"/>
  <!-- PECH Text -->
  <text x="90" y="48" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="38" fill="url(#textGrad)" letter-spacing="5">PECH</text>
