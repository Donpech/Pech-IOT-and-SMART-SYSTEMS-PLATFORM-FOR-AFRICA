<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" width="400" height="200">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF"/>
      <stop offset="100%" style="stop-color:#F5A623"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF"/>
      <stop offset="100%" style="stop-color:#0099CC"/>
    </linearGradient>
  </defs>
  <!-- Hexagonal Icon -->
  <polygon points="100,15 155,42.5 155,97.5 100,125 45,97.5 45,42.5" fill="url(#hexGrad)" stroke="none"/>
  <!-- Inner hexagon cutout effect -->
  <polygon points="100,30 142,50 142,90 100,110 58,90 58,50" fill="#FFFFFF" opacity="0.15"/>
  <!-- Solar/Energy symbol inside hex -->
  <circle cx="100" cy="70" r="18" fill="none" stroke="#FFFFFF" stroke-width="3"/>
  <line x1="100" y1="46" x2="100" y2="54" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="100" y1="86" x2="100" y2="94" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="76" y1="70" x2="84" y2="70" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="116" y1="70" x2="124" y2="70" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="83" y1="53" x2="88.5" y2="58.5" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="111.5" y1="81.5" x2="117" y2="87" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="117" y1="53" x2="111.5" y2="58.5" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="88.5" y1="81.5" x2="83" y2="87" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round"/>
  <!-- PECH Text -->
  <text x="185" y="85" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-weight="800" font-size="56" fill="url(#textGrad)" letter-spacing="6">PECH</text>
  <!-- Tagline -->
  <text x="187" y="110" font-family="'Open Sans', 'Segoe UI', Arial, sans-serif" font-weight="400" font-size="11" fill="#0099CC" letter-spacing="3.5">GROUP HOLDINGS LTD</text>
  <!-- Gradient accent bar -->
  <rect x="185" y="118" width="190" height="3" rx="1.5" fill="url(#hexGrad)"/>
  <!-- Tagline below bar -->
  <text x="185" y="140" font-family="'Open Sans', 'Segoe UI', Arial, sans-serif" font-weight="300" font-size="9" fill="#666666" letter-spacing="1">Technology &amp; Platform Infrastructure Enablers</text>
</svg>
