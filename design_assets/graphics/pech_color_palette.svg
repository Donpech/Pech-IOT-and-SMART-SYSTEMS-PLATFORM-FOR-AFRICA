<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200" width="700" height="200">
  <defs>
    <linearGradient id="hexGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF"/>
      <stop offset="100%" style="stop-color:#F5A623"/>
    </linearGradient>
  </defs>
  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-family="'Montserrat', 'Segoe UI', Arial, sans-serif" font-weight="700" font-size="16" fill="#1B2838" letter-spacing="3">PECH BRAND COLOR PALETTE</text>
  <rect x="120" y="35" width="460" height="2" rx="1" fill="url(#hexGrad)"/>

  <!-- Sky Blue -->
  <rect x="20" y="55" width="100" height="80" rx="8" fill="#00BFFF"/>
  <text x="70" y="155" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-weight="600" font-size="11" fill="#2C3E50">Sky Blue</text>
  <text x="70" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#666">#00BFFF</text>
  <text x="70" y="185" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="9" fill="#999">Primary</text>

  <!-- Orange/Amber -->
  <rect x="140" y="55" width="100" height="80" rx="8" fill="#F5A623"/>
  <text x="190" y="155" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-weight="600" font-size="11" fill="#2C3E50">Orange</text>
  <text x="190" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#666">#F5A623</text>
  <text x="190" y="185" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="9" fill="#999">Secondary</text>

  <!-- Dark Blue -->
  <rect x="260" y="55" width="100" height="80" rx="8" fill="#0099CC"/>
  <text x="310" y="155" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-weight="600" font-size="11" fill="#2C3E50">Dark Blue</text>
  <text x="310" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#666">#0099CC</text>
  <text x="310" y="185" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="9" fill="#999">Blue Shade</text>

  <!-- Dark Orange -->
  <rect x="380" y="55" width="100" height="80" rx="8" fill="#E08A00"/>
  <text x="430" y="155" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-weight="600" font-size="11" fill="#2C3E50">Dark Orange</text>
  <text x="430" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#666">#E08A00</text>
  <text x="430" y="185" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="9" fill="#999">Orange Shade</text>

  <!-- Dark Background -->
  <rect x="500" y="55" width="100" height="80" rx="8" fill="#1B2838"/>
  <text x="550" y="155" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-weight="600" font-size="11" fill="#2C3E50">Dark Navy</text>
  <text x="550" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#666">#1B2838</text>
  <text x="550" y="185" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="9" fill="#999">Background</text>

  <!-- White -->
  <rect x="620" y="55" width="100" height="80" rx="8" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="1"/>
  <text x="670" y="155" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-weight="600" font-size="11" fill="#2C3E50">White</text>
  <text x="670" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="10" fill="#666">#FFFFFF</text>
  <text x="670" y="185" text-anchor="middle" font-family="'Open Sans', Arial, sans-serif" font-size="9" fill="#999">Clean Layout</text>
</svg>
