<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 115" width="100" height="115">
  <!-- Tileable hexagonal pattern background -->
  <defs>
    <linearGradient id="hexFill" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00BFFF;stop-opacity:0.04"/>
      <stop offset="100%" style="stop-color:#F5A623;stop-opacity:0.04"/>
    </linearGradient>
  </defs>
  <!-- Row 1 hex -->
  <polygon points="50,2 85,17.5 85,48.5 50,64 15,48.5 15,17.5" fill="none" stroke="#00BFFF" stroke-width="0.5" opacity="0.08"/>
  <polygon points="50,2 85,17.5 85,48.5 50,64 15,48.5 15,17.5" fill="url(#hexFill)"/>
  <!-- Row 2 hex (offset) -->
  <polygon points="0,49 35,64.5 35,95.5 0,111 -35,95.5 -35,64.5" fill="none" stroke="#F5A623" stroke-width="0.5" opacity="0.06"/>
  <polygon points="100,49 135,64.5 135,95.5 100,111 65,95.5 65,64.5" fill="none" stroke="#F5A623" stroke-width="0.5" opacity="0.06"/>
  <!-- Tiny center dots -->
  <circle cx="50" cy="33" r="1.5" fill="#00BFFF" opacity="0.06"/>
  <circle cx="0" cy="80" r="1.5" fill="#F5A623" opacity="0.05"/>
  <circle cx="100" cy="80" r="1.5" fill="#F5A623" opacity="0.05"/>
</svg>
