  <line x1="180" y1="270" x2="180" y2="330" stroke="#00BFFF" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="490" y1="270" x2="490" y2="330" stroke="#F5A623" stroke-width="2" stroke-dasharray="6,3"/>
  <line x1="785" y1="270" x2="785" y2="330" stroke="rgba(0,191,255,0.4)" stroke-width="1.5" stroke-dasharray="6,3"/>
