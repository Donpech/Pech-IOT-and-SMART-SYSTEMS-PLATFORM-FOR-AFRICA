  <text x="895" y="660" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">Models, RAG, analytics</text>
  <text x="895" y="673" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8">Qwen, Superset</text>

  <rect x="1000" y="615" width="170" height="65" rx="8" fill="#162435" stroke="rgba(0,191,255,0.6)" stroke-width="1"/>
