  <text x="315" y="735" text-anchor="middle" fill="#00BFFF" font-size="13" font-weight="bold">DILUTION PROTECTION SCENARIOS</text>

  <!-- Scenario headers -->
  <text x="80" y="760" fill="#F5A623" font-size="10" font-weight="bold">Founder Economic %</text>
  <text x="280" y="760" fill="#F5A623" font-size="10" font-weight="bold">Voting Power</text>
  <text x="430" y="760" fill="#F5A623" font-size="10" font-weight="bold">Still Controls?</text>

  <line x1="70" y1="768" x2="560" y2="768" stroke="rgba(0,191,255,0.2)" stroke-width="1"/>

  <text x="80" y="790" fill="#FFFFFF" font-size="11">40% (Day 1)</text>
  <text x="280" y="790" fill="#00BFFF" font-size="11" font-weight="bold">93.0%</text>
  <text x="430" y="790" fill="#00FF88" font-size="11" font-weight="bold">YES — Full control</text>

  <text x="80" y="815" fill="#FFFFFF" font-size="11">20% (after dilution)</text>
  <text x="280" y="815" fill="#00BFFF" font-size="11" font-weight="bold">76.9%</text>
  <text x="430" y="815" fill="#00FF88" font-size="11" font-weight="bold">YES — Special resolutions</text>

  <text x="80" y="840" fill="#FFFFFF" font-size="11">10% (heavy dilution)</text>
  <text x="280" y="840" fill="#00BFFF" font-size="11" font-weight="bold">62.5%</text>
  <text x="430" y="840" fill="#00FF88" font-size="11" font-weight="bold">YES — Ordinary resolutions</text>

  <text x="80" y="860" fill="rgba(255,255,255,0.4)" font-size="9">Class B shares carry 10× voting power. Vision stays protected regardless of economic dilution.</text>

  <!-- ===== KEY TERMS BOX ===== -->
  <rect x="620" y="710" width="540" height="160" rx="10" fill="#162435" stroke="rgba(245,166,35,0.3)" stroke-width="1"/>
  <text x="890" y="735" text-anchor="middle" fill="#F5A623" font-size="13" font-weight="bold">KEY TERMS</text>

  <text x="650" y="762" fill="#00BFFF" font-size="10" font-weight="bold">Share Classes:</text>
  <text x="750" y="762" fill="rgba(255,255,255,0.7)" font-size="10">Class B (10×) = Founder only | Class A (1×) = Everyone else</text>

  <text x="650" y="785" fill="#00BFFF" font-size="10" font-weight="bold">Ndu's Rights:</text>
  <text x="750" y="785" fill="rgba(255,255,255,0.7)" font-size="10">40% dividends, board seat, veto on major decisions</text>

  <text x="650" y="808" fill="#00BFFF" font-size="10" font-weight="bold">Funding:</text>
  <text x="750" y="808" fill="rgba(255,255,255,0.7)" font-size="10">Ndu funds operations | If he stops → Strategic Reserve activates</text>

  <text x="650" y="831" fill="#00BFFF" font-size="10" font-weight="bold">Lock-Up:</text>
  <text x="750" y="831" fill="rgba(255,255,255,0.7)" font-size="10">24-month lock-up for both parties from incorporation</text>

  <text x="650" y="854" fill="#00BFFF" font-size="10" font-weight="bold">Legal Basis:</text>
  <text x="750" y="854" fill="rgba(255,255,255,0.7)" font-size="10">CAMA 2020 Section 142 — Dual-class shares permitted</text>

  <!-- Footer -->
