  <text x="135" y="660" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">Panels, batteries, inverters</text>
  <text x="135" y="673" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8">energy monitoring</text>

  <rect x="240" y="615" width="170" height="65" rx="8" fill="#162435" stroke="rgba(0,191,255,0.6)" stroke-width="1"/>
