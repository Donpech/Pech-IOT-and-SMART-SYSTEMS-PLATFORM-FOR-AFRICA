  <text x="325" y="660" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">Water controllers, sensors</text>
  <text x="325" y="673" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8">ThingsBoard, SCADA</text>

  <rect x="430" y="615" width="170" height="65" rx="8" fill="#162435" stroke="rgba(245,166,35,0.6)" stroke-width="1"/>
