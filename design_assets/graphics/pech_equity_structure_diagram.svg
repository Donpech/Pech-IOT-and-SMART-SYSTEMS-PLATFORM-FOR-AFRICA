  <text x="1085" y="660" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">Hardware, co-lo, DevOps</text>
  <text x="1085" y="673" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8">Docker, K3s, platform</text>

  <!-- ===== DILUTION SCENARIO BOX ===== -->
