  <rect x="940" y="115" width="220" height="155" rx="10" fill="#162435" stroke="rgba(245,166,35,0.5)" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="940" y="115" width="220" height="28" rx="10" fill="rgba(245,166,35,0.15)"/>
  <rect x="940" y="135" width="220" height="8" fill="#162435"/>
  <text x="1050" y="135" text-anchor="middle" fill="#F5A623" font-size="11" font-weight="bold">STRATEGIC RESERVE</text>
  <text x="1050" y="165" text-anchor="middle" fill="#FFFFFF" font-size="12">Partners &amp; Future Investors</text>
  <text x="1050" y="190" text-anchor="middle" fill="#F5A623" font-size="18" font-weight="bold">10% Economic</text>
  <text x="1050" y="212" text-anchor="middle" fill="#00BFFF" font-size="14">1.2% Voting</text>
  <text x="1050" y="232" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">CLASS A — Board approval required</text>
