  <text x="600" y="45" text-anchor="middle" fill="#00BFFF" font-size="24" font-weight="bold" letter-spacing="2">PECH GROUP HOLDINGS LTD</text>
  <text x="600" y="70" text-anchor="middle" fill="#F5A623" font-size="14" letter-spacing="4">EQUITY &amp; CORPORATE STRUCTURE</text>
  <text x="600" y="90" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10" letter-spacing="2">DUAL-CLASS SHARE STRUCTURE — 40/40/10/10</text>

  <!-- ===== TOP ROW: SHAREHOLDERS ===== -->

  <!-- Founder Box -->
  <rect x="50" y="115" width="260" height="155" rx="10" fill="#162435" stroke="#00BFFF" stroke-width="2" filter="url(#shadow)"/>
  <rect x="50" y="115" width="260" height="30" rx="10" fill="url(#blueGrad)"/>
  <rect x="50" y="135" width="260" height="10" fill="#162435"/>
  <text x="180" y="136" text-anchor="middle" fill="#1B2838" font-size="12" font-weight="bold">FOUNDER &amp; CEO</text>
  <text x="180" y="170" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Chukwunwike Peter Ndibe</text>
  <text x="180" y="192" text-anchor="middle" fill="#00BFFF" font-size="20" font-weight="bold">40% Economic</text>
  <text x="180" y="215" text-anchor="middle" fill="#F5A623" font-size="16" font-weight="bold">93.0% Voting</text>
  <text x="180" y="237" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">CLASS B — 10× Super-Voting</text>
  <text x="180" y="257" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">4,000,000 shares = 40,000,000 votes</text>

  <!-- Ndu Box (Investor Version) -->
  <rect x="360" y="115" width="260" height="155" rx="10" fill="#162435" stroke="#F5A623" stroke-width="2" filter="url(#shadow)"/>
  <rect x="360" y="115" width="260" height="30" rx="10" fill="url(#orangeGrad)"/>
  <rect x="360" y="135" width="260" height="10" fill="#162435"/>
  <text x="490" y="136" text-anchor="middle" fill="#1B2838" font-size="12" font-weight="bold">INVESTOR &amp; ADVISORY CHAIRMAN</text>
  <text x="490" y="170" text-anchor="middle" fill="#FFFFFF" font-size="13" font-weight="bold">Ndu Jerry Chijioke</text>
  <text x="490" y="192" text-anchor="middle" fill="#F5A623" font-size="20" font-weight="bold">40% Economic</text>
  <text x="490" y="215" text-anchor="middle" fill="#00BFFF" font-size="16" font-weight="bold">4.7% Voting</text>
  <text x="490" y="237" text-anchor="middle" fill="rgba(255,255,255,0.6)" font-size="11">CLASS A — 1× Standard Voting</text>
  <text x="490" y="257" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">4,000,000 shares = 4,000,000 votes</text>

