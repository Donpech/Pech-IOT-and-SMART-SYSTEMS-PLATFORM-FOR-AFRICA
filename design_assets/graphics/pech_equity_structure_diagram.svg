  <rect x="670" y="115" width="230" height="28" rx="10" fill="rgba(0,191,255,0.15)"/>
  <rect x="670" y="135" width="230" height="8" fill="#162435"/>
  <text x="785" y="135" text-anchor="middle" fill="#00BFFF" font-size="11" font-weight="bold">ESOP POOL</text>
  <text x="785" y="165" text-anchor="middle" fill="#FFFFFF" font-size="12">CTO, Key Hires</text>
  <text x="785" y="190" text-anchor="middle" fill="#00BFFF" font-size="18" font-weight="bold">10% Economic</text>
  <text x="785" y="212" text-anchor="middle" fill="#F5A623" font-size="14">1.2% Voting</text>
  <text x="785" y="232" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="10">CLASS A — 4yr vest, 1yr cliff</text>
  <text x="785" y="250" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="10">1,000,000 shares</text>

