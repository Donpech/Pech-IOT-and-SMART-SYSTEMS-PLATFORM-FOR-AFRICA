  <text x="515" y="660" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">Marketplace, merchants</text>
  <text x="515" y="673" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8">Medusa, logistics</text>

  <rect x="620" y="615" width="170" height="65" rx="8" fill="#162435" stroke="rgba(245,166,35,0.6)" stroke-width="1"/>
  <text x="705" y="640" text-anchor="middle" fill="#F5A623" font-size="11" font-weight="bold">Fintech &amp; Payments</text>
  <text x="705" y="660" text-anchor="middle" fill="rgba(255,255,255,0.5)" font-size="9">BNPL, credit, payment</text>
  <text x="705" y="673" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8">Fineract, Paystack</text>

  <rect x="810" y="615" width="170" height="65" rx="8" fill="#162435" stroke="rgba(0,191,255,0.6)" stroke-width="1"/>
