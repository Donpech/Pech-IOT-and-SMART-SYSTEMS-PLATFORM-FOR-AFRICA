<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 480" font-family="Arial, Helvetica, sans-serif">
  <rect width="900" height="480" fill="#1B2838" rx="12"/>
  <text x="450" y="35" text-anchor="middle" fill="#FFF" font-size="22" font-weight="bold">Licensing, Compliance &amp; Regulatory Timeline</text>
  <text x="450" y="55" text-anchor="middle" fill="#00BFFF" font-size="12">Nigerian Regulatory Requirements — Phased Compliance Strategy</text>

  <!-- Timeline -->
  <line x1="80" y1="85" x2="830" y2="85" stroke="#F5A623" stroke-width="2"/>
  <polygon points="830,80 840,85 830,90" fill="#F5A623"/>
  <text x="80" y="78" fill="#FFF" font-size="9">Mo 0</text>
  <text x="270" y="78" fill="#FFF" font-size="9">Mo 6</text>
  <text x="455" y="78" fill="#FFF" font-size="9">Mo 9</text>
  <text x="580" y="78" fill="#FFF" font-size="9">Mo 12</text>
  <text x="720" y="78" fill="#FFF" font-size="9">Mo 18</text>
  <text x="820" y="78" fill="#FFF" font-size="9">Mo 24</text>

  <!-- Phase 1: Foundation (Mo 0-3) -->
  <rect x="50" y="100" width="180" height="130" rx="8" fill="#0D2137" stroke="#00BFFF" stroke-width="1.5"/>
  <rect x="50" y="100" width="180" height="25" rx="8" fill="#0099CC"/>
  <text x="140" y="117" text-anchor="middle" fill="#FFF" font-size="10" font-weight="bold">FOUNDATION (Mo 0-3)</text>
  <text x="60" y="142" fill="#00BFFF" font-size="8" font-weight="bold">CAC Registration</text>
  <text x="60" y="155" fill="#FFF" font-size="8">Company + subsidiaries</text>
  <text x="60" y="172" fill="#00BFFF" font-size="8" font-weight="bold">NDPA Compliance</text>
  <text x="60" y="185" fill="#FFF" font-size="8">Data protection registration</text>
  <text x="60" y="202" fill="#00BFFF" font-size="8" font-weight="bold">Employment Contracts</text>
  <text x="60" y="215" fill="#FFF" font-size="8">NDA, IP assignment, pension</text>

  <!-- Phase 2: Operations (Mo 4-9) -->
  <rect x="245" y="100" width="190" height="130" rx="8" fill="#0D2137" stroke="#00BFFF" stroke-width="1.5"/>
  <rect x="245" y="100" width="190" height="25" rx="8" fill="#0099CC"/>
  <text x="340" y="117" text-anchor="middle" fill="#FFF" font-size="10" font-weight="bold">OPERATIONS (Mo 4-9)</text>
  <text x="255" y="142" fill="#00BFFF" font-size="8" font-weight="bold">SON Certification</text>
  <text x="255" y="155" fill="#FFF" font-size="8">Product standards for hardware</text>
  <text x="255" y="172" fill="#00BFFF" font-size="8" font-weight="bold">NCC Type Approval</text>
  <text x="255" y="185" fill="#FFF" font-size="8">IoT/wireless device approval</text>
  <text x="255" y="202" fill="#00BFFF" font-size="8" font-weight="bold">NAFDAC (if applicable)</text>
  <text x="255" y="215" fill="#FFF" font-size="8">Packaging compliance</text>

  <!-- Phase 3: Financial Licenses (Mo 9-18) -->
  <rect x="450" y="100" width="190" height="130" rx="8" fill="#0D2137" stroke="#F5A623" stroke-width="2"/>
  <rect x="450" y="100" width="190" height="25" rx="8" fill="#E08A00"/>
  <text x="545" y="117" text-anchor="middle" fill="#FFF" font-size="10" font-weight="bold">FINANCIAL (Mo 9-18)</text>
  <text x="460" y="142" fill="#F5A623" font-size="8" font-weight="bold">CBN PSSP License</text>
  <text x="460" y="155" fill="#FFF" font-size="8">₦100M capital + ₦100M escrow</text>
  <text x="460" y="172" fill="#F5A623" font-size="8" font-weight="bold">PCI DSS Compliance</text>
  <text x="460" y="185" fill="#FFF" font-size="8">Payment card security standard</text>
  <text x="460" y="202" fill="#F5A623" font-size="8" font-weight="bold">AML/CFT Policies</text>
  <text x="460" y="215" fill="#FFF" font-size="8">Anti-money laundering setup</text>

  <!-- Phase 4: Scale (Mo 18-24) -->
  <rect x="655" y="100" width="190" height="130" rx="8" fill="#0D2137" stroke="#F5A623" stroke-width="2"/>
  <rect x="655" y="100" width="190" height="25" rx="8" fill="#E08A00"/>
  <text x="750" y="117" text-anchor="middle" fill="#FFF" font-size="10" font-weight="bold">EXPANSION (Mo 18-24)</text>
  <text x="665" y="142" fill="#F5A623" font-size="8" font-weight="bold">CBN PTSP License</text>
  <text x="665" y="155" fill="#FFF" font-size="8">Terminal service provider ~₦201M</text>
  <text x="665" y="172" fill="#F5A623" font-size="8" font-weight="bold">ECOWAS Compliance</text>
  <text x="665" y="185" fill="#FFF" font-size="8">West Africa expansion prep</text>
  <text x="665" y="202" fill="#F5A623" font-size="8" font-weight="bold">ISO 27001</text>
  <text x="665" y="215" fill="#FFF" font-size="8">Information security cert</text>

  <!-- Compliance requirements table -->
  <rect x="50" y="250" width="800" height="210" rx="8" fill="#0D2137" stroke="#0099CC" stroke-width="1"/>
  <text x="70" y="275" fill="#00BFFF" font-size="12" font-weight="bold">KEY NIGERIAN REGULATORY REQUIREMENTS</text>

  <!-- Headers -->
  <text x="70" y="300" fill="#F5A623" font-size="9" font-weight="bold">REGULATION</text>
  <text x="280" y="300" fill="#F5A623" font-size="9" font-weight="bold">REQUIREMENT</text>
  <text x="600" y="300" fill="#F5A623" font-size="9" font-weight="bold">COST</text>
  <text x="720" y="300" fill="#F5A623" font-size="9" font-weight="bold">PHASE</text>
  <line x1="60" y1="306" x2="840" y2="306" stroke="#0099CC" stroke-width="0.5"/>

  <text x="70" y="322" fill="#FFF" font-size="9">Labour Act (Cap L1)</text>
  <text x="280" y="322" fill="#FFF" font-size="9">Written contracts for all staff &gt;3 months</text>
  <text x="600" y="322" fill="#FFF" font-size="9">Legal fees</text>
  <text x="720" y="322" fill="#00BFFF" font-size="9">Phase 1</text>

  <text x="70" y="340" fill="#FFF" font-size="9">Pension Reform Act 2014</text>
  <text x="280" y="340" fill="#FFF" font-size="9">Employer 10% + Employee 8% of monthly salary</text>
  <text x="600" y="340" fill="#FFF" font-size="9">10% payroll</text>
  <text x="720" y="340" fill="#00BFFF" font-size="9">Phase 1</text>

  <text x="70" y="358" fill="#FFF" font-size="9">NHIA Act 2022</text>
  <text x="280" y="358" fill="#FFF" font-size="9">Health insurance for orgs with 5+ employees</text>
  <text x="600" y="358" fill="#FFF" font-size="9">Per employee</text>
  <text x="720" y="358" fill="#00BFFF" font-size="9">Phase 1</text>

  <text x="70" y="376" fill="#FFF" font-size="9">NDPA 2023</text>
  <text x="280" y="376" fill="#FFF" font-size="9">Data protection compliance, DPO appointment, consent</text>
  <text x="600" y="376" fill="#FFF" font-size="9">₦500K-₦2M</text>
  <text x="720" y="376" fill="#00BFFF" font-size="9">Phase 1</text>

  <text x="70" y="394" fill="#FFF" font-size="9">FIRS (WHT)</text>
  <text x="280" y="394" fill="#FFF" font-size="9">5% WHT on contractor payments; 10% professional</text>
  <text x="600" y="394" fill="#FFF" font-size="9">5-10% of fees</text>
  <text x="720" y="394" fill="#00BFFF" font-size="9">Phase 2</text>

  <text x="70" y="412" fill="#FFF" font-size="9">CBN PSSP License</text>
  <text x="280" y="412" fill="#FFF" font-size="9">₦100M capital + ₦100M escrow + application fees</text>
  <text x="600" y="412" fill="#F5A623" font-size="9" font-weight="bold">~₦205M</text>
  <text x="720" y="412" fill="#F5A623" font-size="9">Phase 3-4</text>

  <text x="70" y="430" fill="#FFF" font-size="9">CBN PTSP License</text>
  <text x="280" y="430" fill="#FFF" font-size="9">Terminal service provider license</text>
  <text x="600" y="430" fill="#F5A623" font-size="9" font-weight="bold">~₦201M</text>
  <text x="720" y="430" fill="#F5A623" font-size="9">Phase 4</text>

  <text x="70" y="448" fill="#FFF" font-size="9">Group Life Insurance</text>
  <text x="280" y="448" fill="#FFF" font-size="9">3x annual salary group life cover for all employees</text>
  <text x="600" y="448" fill="#FFF" font-size="9">~1% payroll</text>
  <text x="720" y="448" fill="#00BFFF" font-size="9">Phase 1</text>
</svg>
