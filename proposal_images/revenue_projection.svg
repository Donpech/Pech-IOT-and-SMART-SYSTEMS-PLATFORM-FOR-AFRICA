  <text x="178" y="395" fill="#FFF" font-size="8" text-anchor="middle">Mo 3</text>
  <text x="243" y="395" fill="#FFF" font-size="8" text-anchor="middle">Mo 6</text>
  <text x="340" y="395" fill="#FFF" font-size="8" text-anchor="middle">Mo 9</text>
  <text x="438" y="395" fill="#FFF" font-size="8" text-anchor="middle">Mo 12</text>
  <text x="535" y="395" fill="#FFF" font-size="8" text-anchor="middle">Mo 15</text>
  <text x="633" y="395" fill="#FFF" font-size="8" text-anchor="middle">Mo 18</text>
  <text x="730" y="395" fill="#FFF" font-size="8" text-anchor="middle">Mo 21</text>
  <text x="828" y="395" fill="#FFF" font-size="8" text-anchor="middle">Mo 24</text>

  <!-- Expense line (red/orange) -->
  <polyline points="113,365 145,355 178,340 210,325 243,310 275,300 308,290 340,280 373,270 405,262 438,255 470,248 503,242 535,238 568,235 600,233 633,230 665,228 698,225 730,223 763,220 795,218 828,215" fill="none" stroke="#E08A00" stroke-width="2.5"/>

  <!-- Revenue line (blue) -->
  <polyline points="113,370 145,365 178,355 210,345 243,330 275,318 308,305 340,288 373,270 405,255 438,242 470,225 503,210 535,200 568,185 600,170 633,155 665,145 698,130 730,118 763,108 795,98 828,85" fill="none" stroke="#00BFFF" stroke-width="2.5"/>

  <!-- Break-even point -->
  <circle cx="535" cy="200" r="6" fill="none" stroke="#F5A623" stroke-width="2"/>
  <line x1="535" y1="206" x2="535" y2="250" stroke="#F5A623" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="535" y="265" text-anchor="middle" fill="#F5A623" font-size="9" font-weight="bold">BREAK-EVEN</text>

  <!-- Cash positive point -->
  <circle cx="633" cy="155" r="6" fill="#F5A623"/>
  <line x1="633" y1="161" x2="633" y2="250" stroke="#F5A623" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="633" y="265" text-anchor="middle" fill="#F5A623" font-size="9" font-weight="bold">CASH +VE</text>

