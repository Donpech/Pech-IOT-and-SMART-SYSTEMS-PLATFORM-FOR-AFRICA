  <polygon points="535,200 568,185 600,170 633,155 665,145 698,130 730,118 763,108 795,98 828,85 828,215 795,218 763,220 730,223 698,225 665,228 633,230 600,233 568,235 535,238" fill="#00BFFF" fill-opacity="0.1"/>

  <!-- Legend -->
  <rect x="100" y="405" width="120" height="20" rx="4" fill="#0D2137" stroke="#00BFFF" stroke-width="1"/>
  <line x1="110" y1="415" x2="135" y2="415" stroke="#00BFFF" stroke-width="2.5"/>
