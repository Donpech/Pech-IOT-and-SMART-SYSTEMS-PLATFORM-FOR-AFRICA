  <text x="70" y="135" fill="#FFF" font-size="9" text-anchor="end">₦20M</text>
  <text x="70" y="185" fill="#FFF" font-size="9" text-anchor="end">₦15M</text>
  <text x="70" y="235" fill="#FFF" font-size="9" text-anchor="end">₦10M</text>
  <text x="70" y="285" fill="#FFF" font-size="9" text-anchor="end">₦5M</text>
  <text x="70" y="335" fill="#FFF" font-size="9" text-anchor="end">₦0</text>
  <text x="70" y="375" fill="#FFF" font-size="9" text-anchor="end">-₦5M</text>

  <!-- Grid lines -->
  <line x1="80" y1="80" x2="860" y2="80" stroke="#0099CC" stroke-width="0.3"/>
  <line x1="80" y1="130" x2="860" y2="130" stroke="#0099CC" stroke-width="0.3"/>
  <line x1="80" y1="180" x2="860" y2="180" stroke="#0099CC" stroke-width="0.3"/>
  <line x1="80" y1="230" x2="860" y2="230" stroke="#0099CC" stroke-width="0.3"/>
  <line x1="80" y1="280" x2="860" y2="280" stroke="#0099CC" stroke-width="0.3"/>
  <line x1="80" y1="330" x2="860" y2="330" stroke="#0099CC" stroke-width="0.3"/>

  <!-- X-axis labels -->
