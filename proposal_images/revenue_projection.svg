  <rect x="380" y="405" width="120" height="20" rx="4" fill="#0D2137" stroke="#F5A623" stroke-width="1"/>
  <circle cx="395" cy="415" r="4" fill="#F5A623"/>
  <text x="405" y="419" fill="#FFF" font-size="9">Milestones</text>

  <!-- Bottom summary -->
  <rect x="30" y="440" width="840" height="45" rx="8" fill="#0D2137" stroke="#F5A623" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="50" y="462" fill="#F5A623" font-size="11" font-weight="bold">Mo 24 Target:</text>
  <text x="170" y="462" fill="#FFF" font-size="10">MRR ₦15-25M · Annual run rate ₦180-300M · Team: 37 · Self-funded AI operations</text>
