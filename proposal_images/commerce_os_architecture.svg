  <rect x="40" y="525" width="820" height="55" rx="8" fill="#0D2137" stroke="#F5A623" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="60" y="548" fill="#F5A623" font-size="11" font-weight="bold">ECOSYSTEM FLYWHEEL:</text>
  <text x="230" y="548" fill="#FFF" font-size="10">Hardware → IoT Data → AI Models → Platform Intelligence → Better Products → More Users → Data Moat</text>
  <text x="60" y="568" fill="#00BFFF" font-size="10">All models Apache-2.0 / MIT licensed. Self-hosted in Lagos. No vendor lock-in. Full rebranding rights.</text>
