<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520" font-family="Arial, Helvetica, sans-serif">
  <rect width="900" height="520" fill="#1B2838" rx="12"/>
  <text x="450" y="35" text-anchor="middle" fill="#FFF" font-size="22" font-weight="bold">Nigeria Market Entry Strategy</text>
  <text x="450" y="55" text-anchor="middle" fill="#00BFFF" font-size="12">Lagos First → Southwest → National → West Africa</text>

  <!-- Phase 1: Lagos (center) -->
  <rect x="300" y="75" width="300" height="135" rx="10" fill="#0D2137" stroke="#00BFFF" stroke-width="2"/>
  <rect x="300" y="75" width="300" height="28" rx="10" fill="#0099CC"/>
  <text x="450" y="94" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold">PHASE 1: LAGOS (Mo 0-6)</text>
  <text x="315" y="120" fill="#F5A623" font-size="10" font-weight="bold">Target Markets:</text>
  <text x="315" y="137" fill="#FFF" font-size="9">Computer Village (Ikeja) · Trade Fair Complex</text>
  <text x="315" y="152" fill="#FFF" font-size="9">Alaba International · Balogun Market</text>
  <text x="315" y="167" fill="#FFF" font-size="9">Lekki/VI Tech Corridor</text>
  <text x="315" y="185" fill="#00BFFF" font-size="9" font-weight="bold">5-8 markets · 1,000+ merchants · PECH HQ</text>
  <text x="315" y="200" fill="#FFF" font-size="8">Hub: Ikeja | Spoke: Alaba, Balogun, Lekki</text>

  <!-- Arrows from Lagos -->
  <line x1="300" y1="170" x2="200" y2="230" stroke="#F5A623" stroke-width="1.5"/>
  <polygon points="200,227 196,237 207,234" fill="#F5A623"/>
  <line x1="600" y1="170" x2="700" y2="230" stroke="#F5A623" stroke-width="1.5"/>
  <polygon points="700,227 693,234 704,237" fill="#F5A623"/>

  <!-- Phase 2: Southwest -->
  <rect x="30" y="230" width="260" height="120" rx="8" fill="#0D2137" stroke="#F5A623" stroke-width="1.5"/>
  <rect x="30" y="230" width="260" height="25" rx="8" fill="#E08A00"/>
  <text x="160" y="248" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold">PHASE 2: SOUTHWEST (Mo 7-12)</text>
  <text x="45" y="275" fill="#FFF" font-size="9">Ibadan — Bodija Market, Dugbe</text>
  <text x="45" y="292" fill="#FFF" font-size="9">Abeokuta — Kuto Market</text>
  <text x="45" y="309" fill="#FFF" font-size="9">Ilorin — Oja Oba, Unity Road</text>
  <text x="45" y="330" fill="#F5A623" font-size="9" font-weight="bold">3 new cities · Installer network</text>

  <rect x="610" y="230" width="260" height="120" rx="8" fill="#0D2137" stroke="#F5A623" stroke-width="1.5"/>
  <rect x="610" y="230" width="260" height="25" rx="8" fill="#E08A00"/>
  <text x="740" y="248" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold">PHASE 2: SOUTH (Mo 7-12)</text>
  <text x="625" y="275" fill="#FFF" font-size="9">Port Harcourt — Oil Mill, Mile 1</text>
  <text x="625" y="292" fill="#FFF" font-size="9">Benin City — Oba Market</text>
  <text x="625" y="309" fill="#FFF" font-size="9">Onitsha — Main Market</text>
  <text x="625" y="330" fill="#F5A623" font-size="9" font-weight="bold">3 new cities · Agent network</text>

  <!-- Phase 3: National -->
  <line x1="160" y1="350" x2="300" y2="400" stroke="#00BFFF" stroke-width="1.5"/>
  <polygon points="300,397 293,404 304,407" fill="#00BFFF"/>
  <line x1="740" y1="350" x2="600" y2="400" stroke="#00BFFF" stroke-width="1.5"/>
  <polygon points="600,397 596,407 607,404" fill="#00BFFF"/>

  <rect x="250" y="380" width="400" height="60" rx="8" fill="#0D2137" stroke="#00BFFF" stroke-width="2"/>
  <rect x="250" y="380" width="400" height="25" rx="8" fill="#0099CC"/>
  <text x="450" y="398" text-anchor="middle" fill="#FFF" font-size="12" font-weight="bold">PHASE 3: NATIONAL (Mo 13-24)</text>
  <text x="265" y="425" fill="#FFF" font-size="9">Abuja · Kano · Kaduna · Enugu · Owerri · Warri</text>
  <text x="550" y="425" fill="#F5A623" font-size="9" font-weight="bold">10+ cities</text>

  <!-- West Africa expansion -->
  <line x1="450" y1="440" x2="450" y2="455" stroke="#F5A623" stroke-width="1.5"/>
  <polygon points="445,455 450,465 455,455" fill="#F5A623"/>

  <rect x="150" y="460" width="600" height="45" rx="8" fill="#0D2137" stroke="#F5A623" stroke-width="2" stroke-dasharray="4,3"/>
  <text x="450" y="482" text-anchor="middle" fill="#F5A623" font-size="11" font-weight="bold">FUTURE: WEST AFRICA (Post Mo 24) — Ghana · Cameroon · Senegal · Kenya</text>
  <text x="450" y="498" text-anchor="middle" fill="#FFF" font-size="9">ECOWAS compliance · Francophone localization · Mobile-first · USSD fallback</text>

  <!-- Market size stats -->
  <rect x="30" y="370" width="200" height="80" rx="8" fill="#0D2137" stroke="#0099CC" stroke-width="1"/>
  <text x="130" y="395" text-anchor="middle" fill="#F5A623" font-size="18" font-weight="bold">200M+</text>
  <text x="130" y="412" text-anchor="middle" fill="#FFF" font-size="9">Nigeria population</text>
  <text x="130" y="428" text-anchor="middle" fill="#00BFFF" font-size="9">40M+ SMEs</text>
  <text x="130" y="443" text-anchor="middle" fill="#FFF" font-size="8">85% informal, need ERP</text>

  <rect x="670" y="370" width="200" height="80" rx="8" fill="#0D2137" stroke="#0099CC" stroke-width="1"/>
  <text x="770" y="395" text-anchor="middle" fill="#F5A623" font-size="18" font-weight="bold">₦75M</text>
  <text x="770" y="412" text-anchor="middle" fill="#FFF" font-size="9">Hardware budget</text>
  <text x="770" y="428" text-anchor="middle" fill="#00BFFF" font-size="9">25 SKUs</text>
  <text x="770" y="443" text-anchor="middle" fill="#FFF" font-size="8">African-optimized design</text>
</svg>
