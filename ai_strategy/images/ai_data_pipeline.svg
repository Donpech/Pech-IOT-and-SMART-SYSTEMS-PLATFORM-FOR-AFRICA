<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, Helvetica, sans-serif">
  <rect width="900" height="500" fill="#1B2838" rx="12"/>
  <text x="450" y="35" text-anchor="middle" fill="#FFF" font-size="20" font-weight="bold">PECH RAG Data Pipeline</text>
  <text x="450" y="55" text-anchor="middle" fill="#00BFFF" font-size="12">How AI Learns from Business Data — No Fine-Tuning Required</text>

  <!-- Data Sources (left) -->
  <text x="90" y="95" text-anchor="middle" fill="#F5A623" font-size="12" font-weight="bold">DATA SOURCES</text>
  <rect x="30" y="105" width="120" height="30" rx="5" fill="#E08A00"/><text x="90" y="125" text-anchor="middle" fill="#FFF" font-size="9">Products (Medusa)</text>
  <rect x="30" y="145" width="120" height="30" rx="5" fill="#E08A00"/><text x="90" y="165" text-anchor="middle" fill="#FFF" font-size="9">Tickets (Chatwoot)</text>
  <rect x="30" y="185" width="120" height="30" rx="5" fill="#E08A00"/><text x="90" y="205" text-anchor="middle" fill="#FFF" font-size="9">Solar Manuals</text>
  <rect x="30" y="225" width="120" height="30" rx="5" fill="#E08A00"/><text x="90" y="245" text-anchor="middle" fill="#FFF" font-size="9">Finance (ERPNext)</text>
  <rect x="30" y="265" width="120" height="30" rx="5" fill="#E08A00"/><text x="90" y="285" text-anchor="middle" fill="#FFF" font-size="9">IoT (ThingsBoard)</text>
  <rect x="30" y="305" width="120" height="30" rx="5" fill="#E08A00"/><text x="90" y="325" text-anchor="middle" fill="#FFF" font-size="9">KB (Strapi)</text>

  <!-- Arrow 1 -->
  <line x1="155" y1="210" x2="210" y2="210" stroke="#F5A623" stroke-width="2" marker-end="url(#arrowOrange)"/>
  <defs><marker id="arrowOrange" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#F5A623"/></marker></defs>

  <!-- Airflow (ETL) -->
  <rect x="215" y="170" width="120" height="80" rx="8" fill="#0099CC"/>
  <text x="275" y="200" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold">Apache Airflow</text>
  <text x="275" y="218" text-anchor="middle" fill="#FFF" font-size="9">ETL Pipeline</text>
  <text x="275" y="233" text-anchor="middle" fill="#FFF" font-size="8">(Daily Scheduled)</text>

  <!-- Arrow 2 -->
  <line x1="340" y1="210" x2="395" y2="210" stroke="#00BFFF" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#00BFFF"/></marker></defs>

  <!-- Chunking -->
  <rect x="400" y="170" width="110" height="80" rx="8" fill="#0099CC"/>
  <text x="455" y="200" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold">Chunking</text>
  <text x="455" y="218" text-anchor="middle" fill="#FFF" font-size="9">LangChain</text>
  <text x="455" y="233" text-anchor="middle" fill="#FFF" font-size="8">512 tokens / 50 overlap</text>

  <!-- Arrow 3 -->
  <line x1="515" y1="210" x2="570" y2="210" stroke="#00BFFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Embedding -->
  <rect x="575" y="170" width="110" height="80" rx="8" fill="#0099CC"/>
  <text x="630" y="200" text-anchor="middle" fill="#FFF" font-size="11" font-weight="bold">Embedding</text>
  <text x="630" y="218" text-anchor="middle" fill="#FFF" font-size="9">MiniLM / Nomic</text>
  <text x="630" y="233" text-anchor="middle" fill="#FFF" font-size="8">384-768 dimensions</text>

  <!-- Arrow 4 -->
  <line x1="690" y1="210" x2="745" y2="210" stroke="#00BFFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- Qdrant -->
  <rect x="750" y="160" width="120" height="100" rx="8" fill="#F5A623"/>
  <text x="810" y="195" text-anchor="middle" fill="#1B2838" font-size="13" font-weight="bold">Qdrant</text>
  <text x="810" y="213" text-anchor="middle" fill="#1B2838" font-size="9">Vector Database</text>
  <text x="810" y="228" text-anchor="middle" fill="#1B2838" font-size="8">+ Metadata Filters</text>
  <text x="810" y="248" text-anchor="middle" fill="#1B2838" font-size="8">Apache-2.0</text>

  <!-- Query Time Section -->
  <rect x="30" y="370" width="840" height="100" rx="10" fill="#0D1B2A" stroke="#00BFFF" stroke-width="1.5"/>
  <text x="60" y="395" fill="#00BFFF" font-size="13" font-weight="bold">QUERY TIME (&lt;2 seconds)</text>

  <rect x="50" y="410" width="100" height="45" rx="5" fill="#0099CC"/>
  <text x="100" y="430" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">User Query</text>
  <text x="100" y="445" text-anchor="middle" fill="#FFF" font-size="8">"How do I size..."</text>

  <line x1="155" y1="432" x2="195" y2="432" stroke="#00BFFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="200" y="410" width="100" height="45" rx="5" fill="#0099CC"/>
  <text x="250" y="430" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">Embed Query</text>
  <text x="250" y="445" text-anchor="middle" fill="#FFF" font-size="8">Same model</text>

  <line x1="305" y1="432" x2="345" y2="432" stroke="#00BFFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="350" y="410" width="100" height="45" rx="5" fill="#F5A623"/>
  <text x="400" y="430" text-anchor="middle" fill="#1B2838" font-size="9" font-weight="bold">Qdrant Search</text>
  <text x="400" y="445" text-anchor="middle" fill="#1B2838" font-size="8">Top-5 matches</text>

  <line x1="455" y1="432" x2="495" y2="432" stroke="#F5A623" stroke-width="2" marker-end="url(#arrowOrange)"/>

  <rect x="500" y="410" width="100" height="45" rx="5" fill="#0099CC"/>
  <text x="550" y="430" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">Build Prompt</text>
  <text x="550" y="445" text-anchor="middle" fill="#FFF" font-size="8">System+Context+Q</text>

  <line x1="605" y1="432" x2="645" y2="432" stroke="#00BFFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="650" y="410" width="100" height="45" rx="5" fill="#0099CC"/>
  <text x="700" y="430" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">Qwen2.5 LLM</text>
  <text x="700" y="445" text-anchor="middle" fill="#FFF" font-size="8">Generate answer</text>

  <line x1="755" y1="432" x2="795" y2="432" stroke="#00BFFF" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <rect x="800" y="410" width="55" height="45" rx="5" fill="#F5A623"/>
  <text x="827" y="435" text-anchor="middle" fill="#1B2838" font-size="9" font-weight="bold">Answer</text>
  <text x="827" y="448" text-anchor="middle" fill="#1B2838" font-size="7">+ Sources</text>

  <text x="450" y="490" text-anchor="middle" fill="#666" font-size="10">PECH Group Holdings Ltd — RAG Pipeline — LangChain + Qdrant + Qwen2.5</text>
</svg>
