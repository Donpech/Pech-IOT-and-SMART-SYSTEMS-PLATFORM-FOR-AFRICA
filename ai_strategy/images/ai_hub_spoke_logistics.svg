<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="Arial, Helvetica, sans-serif">
  <rect width="900" height="500" fill="#1B2838" rx="12"/>
  <text x="450" y="35" text-anchor="middle" fill="#FFF" font-size="20" font-weight="bold">PECH Hub-and-Spoke Logistics Network</text>
  <text x="450" y="55" text-anchor="middle" fill="#00BFFF" font-size="12">AI-Optimized Routing — OSRM + LightGBM | Lagos Starting Point</text>

  <!-- Central Hub (Lagos HQ) -->
  <circle cx="450" cy="250" r="55" fill="#F5A623" stroke="#E08A00" stroke-width="3"/>
  <text x="450" y="242" text-anchor="middle" fill="#1B2838" font-size="12" font-weight="bold">LAGOS HQ</text>
  <text x="450" y="258" text-anchor="middle" fill="#1B2838" font-size="9">Central Hub</text>
  <text x="450" y="272" text-anchor="middle" fill="#1B2838" font-size="8">Warehouse + AI Server</text>

  <!-- Distribution Hubs (inner ring) -->
  <!-- Ikeja -->
  <line x1="450" y1="195" x2="450" y2="130" stroke="#00BFFF" stroke-width="2"/>
  <circle cx="450" cy="115" r="30" fill="#0099CC"/>
  <text x="450" y="112" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">Ikeja</text>
  <text x="450" y="125" text-anchor="middle" fill="#FFF" font-size="7">Dist. Hub</text>

  <!-- Lekki -->
  <line x1="495" y1="220" x2="600" y2="160" stroke="#00BFFF" stroke-width="2"/>
  <circle cx="615" cy="150" r="30" fill="#0099CC"/>
  <text x="615" y="147" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">Lekki</text>
  <text x="615" y="160" text-anchor="middle" fill="#FFF" font-size="7">Dist. Hub</text>

  <!-- Ajah -->
  <line x1="500" y1="265" x2="630" y2="280" stroke="#00BFFF" stroke-width="2"/>
  <circle cx="650" cy="285" r="30" fill="#0099CC"/>
  <text x="650" y="282" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">Ajah</text>
  <text x="650" y="295" text-anchor="middle" fill="#FFF" font-size="7">Dist. Hub</text>

  <!-- Surulere -->
  <line x1="405" y1="280" x2="310" y2="340" stroke="#00BFFF" stroke-width="2"/>
  <circle cx="295" cy="350" r="30" fill="#0099CC"/>
  <text x="295" y="347" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">Surulere</text>
  <text x="295" y="360" text-anchor="middle" fill="#FFF" font-size="7">Dist. Hub</text>

  <!-- Yaba -->
  <line x1="400" y1="235" x2="290" y2="200" stroke="#00BFFF" stroke-width="2"/>
  <circle cx="275" cy="190" r="30" fill="#0099CC"/>
  <text x="275" y="187" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">Yaba</text>
  <text x="275" y="200" text-anchor="middle" fill="#FFF" font-size="7">Dist. Hub</text>

  <!-- Apapa -->
  <line x1="415" y1="295" x2="340" y2="410" stroke="#00BFFF" stroke-width="2"/>
  <circle cx="330" cy="425" r="30" fill="#0099CC"/>
  <text x="330" y="422" text-anchor="middle" fill="#FFF" font-size="9" font-weight="bold">Apapa</text>
  <text x="330" y="435" text-anchor="middle" fill="#FFF" font-size="7">Port Hub</text>

  <!-- Delivery Points (outer ring, small dots) -->
  <!-- From Ikeja -->
  <circle cx="380" cy="85" r="8" fill="#E08A00"/><text x="380" y="75" text-anchor="middle" fill="#FFF" font-size="7">D1</text>
  <circle cx="520" cy="85" r="8" fill="#E08A00"/><text x="520" y="75" text-anchor="middle" fill="#FFF" font-size="7">D2</text>
  <circle cx="450" cy="70" r="8" fill="#E08A00"/><text x="450" y="60" text-anchor="middle" fill="#FFF" font-size="7">D3</text>
  <line x1="450" y1="85" x2="380" y2="85" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>
  <line x1="450" y1="85" x2="520" y2="85" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>
  <line x1="450" y1="85" x2="450" y2="78" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>

  <!-- From Lekki -->
  <circle cx="700" cy="115" r="8" fill="#E08A00"/>
  <circle cx="680" cy="170" r="8" fill="#E08A00"/>
  <line x1="645" y1="150" x2="700" y2="115" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>
  <line x1="645" y1="150" x2="680" y2="170" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>

  <!-- From Ajah -->
  <circle cx="730" cy="310" r="8" fill="#E08A00"/>
  <circle cx="710" cy="260" r="8" fill="#E08A00"/>
  <line x1="680" y1="285" x2="730" y2="310" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>
  <line x1="680" y1="285" x2="710" y2="260" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>

  <!-- From Surulere -->
  <circle cx="220" cy="370" r="8" fill="#E08A00"/>
  <circle cx="260" cy="400" r="8" fill="#E08A00"/>
  <line x1="265" y1="350" x2="220" y2="370" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>
  <line x1="265" y1="350" x2="260" y2="400" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>

  <!-- From Yaba -->
  <circle cx="200" cy="165" r="8" fill="#E08A00"/>
  <circle cx="230" cy="140" r="8" fill="#E08A00"/>
  <line x1="245" y1="190" x2="200" y2="165" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>
  <line x1="245" y1="190" x2="230" y2="140" stroke="#F5A623" stroke-width="1" stroke-dasharray="3"/>

  <!-- Legend -->
  <rect x="580" y="360" width="290" height="110" rx="8" fill="#0D1B2A" stroke="#00BFFF" stroke-width="1"/>
  <text x="600" y="385" fill="#00BFFF" font-size="11" font-weight="bold">LEGEND</text>
  <circle cx="610" cy="405" r="8" fill="#F5A623"/><text x="630" y="409" fill="#FFF" font-size="9">Central Hub (AI Server + Warehouse)</text>
  <circle cx="610" cy="425" r="8" fill="#0099CC"/><text x="630" y="429" fill="#FFF" font-size="9">Distribution Hub (Local Depot)</text>
  <circle cx="610" cy="445" r="8" fill="#E08A00"/><text x="630" y="449" fill="#FFF" font-size="9">Delivery Point (Customer / Installer)</text>

  <!-- AI Features callout -->
  <rect x="60" y="420" width="250" height="55" rx="6" fill="#0D1B2A" stroke="#F5A623" stroke-width="1"/>
  <text x="80" y="440" fill="#F5A623" font-size="10" font-weight="bold">AI-POWERED FEATURES</text>
  <text x="80" y="455" fill="#FFF" font-size="8">OSRM: Real-time route optimization</text>
  <text x="80" y="468" fill="#FFF" font-size="8">LightGBM: Demand forecasting per zone</text>

  <text x="450" y="495" text-anchor="middle" fill="#666" font-size="10">PECH Group Holdings Ltd — Lagos Hub-and-Spoke Network</text>
</svg>
